{% extends 'base.html' %}
{% load static %}
{% block extra_head %}
    <link rel="stylesheet" href="{% static 'css/season_create.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
{% endblock %}
{% block content %}



 
<section class="section parallax-container breadcrumbs-wrap" data-parallax-img="{% static 'img/players_backdrop.png' %}">
    <div class="material-parallax parallax">
        
        <img src="{% static 'img/players_backdrop.png' %}" alt="" style="transform: translate3d(-50%, 82px, 0px); display: block;">
    </div>
    <div class="parallax-content breadcrumbs-custom context-dark">
        <div class="container">
            <h2 class="breadcrumbs-custom-title">Season Registration</h2>
            <ul class="breadcrumbs-custom-path">
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'season-competition-list' %}">Seasons List</a></li>
                <li class="active">Season Registration</li>
            </ul>
        </div>
    </div>
</section>


<div class="container mt-5">
    <div class="form-container">
        <h2 class="text-center">Season Form</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <!-- START: MANUAL FIELD RENDERING FOR SEASON FORM -->

            <!-- Field 1: Name -->
            <div class="form-group-custom">
                <label for="{{ form.name.id_for_label }}">Name:</label>
                {{ form.name }}
            </div>

            <!-- Field 2: Year -->
            <div class="form-group-custom" style="width: 100% !important; max-width: 200px;">
                <label for="{{ form.year.id_for_label }}">Year:</label>
                {{ form.year }}
            </div>

            <!-- Field 3: is_current_season (Boolean Checkbox) -->
            <div class="form-group-custom boolean-field"> 
                {{ form.is_current_season }}
                <label for="{{ form.is_current_season.id_for_label }}">{{ form.is_current_season.label }}</label>
            </div>
            
            <!-- END: MANUAL FIELD RENDERING -->

            <div class="text-center mt-4"> 
                <input type="submit" value="Submit" class="btn btn-success">
            </div>
        </form>
    </div>
</div>
<br><br>

{% endblock %}
