{% extends 'base.html' %}
{% load static %}
{% block extra_head %}
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
{% endblock %}

{% block content %}

    <style>
        /*
         * REGISTRATION PAGE STYLES
         * Focused on isolation, centering, and dark theme consistency.
         */

        /* Wrapper for centering the whole content block */
        .login-page-wrapper {
            background: linear-gradient(135deg, #1f2937, #0f172a);
            min-height: 100vh;
            display: flex;
            justify-content: center; /* Centers the content horizontally */
            align-items: center;     /* Centers the content vertically */
            color: #f9fafb;
            font-family: 'Poppins', sans-serif; 
            width: 100%;
        }

        /* --- Login Container (Controls the maximum width of the card) --- */
        .login-container {
            padding: 20px;
            width: 100%;
            max-width: 600px; /* Wider width for registration form */
        }
        
        /* --- Login Card Styling --- */
        .login-card {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(71, 85, 105, 0.5);
            backdrop-filter: blur(5px);
            width: 100%; 
        }

        .card-title {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
            color: #4ade80;
        }

        .card-subtitle {
            font-size: 0.9em;
            color: #c99d1b;
            text-align: center;
            margin-bottom: 30px;
        }

   


        
    


    </style>

    <div class="login-page-wrapper">
        <div class="login-container">
            <div class="login-card align-items-center">
                <h1 class="card-title">Password Reset Link Sent </h1>
                 
                <hr style="background-color:grey;"> <br> 
                <p class="card-subtitle">A link to reset your password has been sent to your email.</p> 
                <p class="card-subtitle">Note that the link expires in <strong>5 minutes</strong></p> 
            </div>
        </div>
    </div>
    




{% endblock %}
